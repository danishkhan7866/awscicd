name: CI-CD-Staging

on:
  push:
    branches: [staging]

env:
  IMAGE: ${{ secrets.DOCKER_USERNAME }}/demo-app

jobs:

# ------------------------
# BUILD & PUSH
# ------------------------
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Image
        run: docker build -t $IMAGE:${{ github.sha }} .

      - name: Push Image
        run: docker push $IMAGE:${{ github.sha }}

# ------------------------
# DEPLOY
# ------------------------
  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:

      # ---------------- SSH SETUP ----------------
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      # ---------------- DEBUG STEP (IMPORTANT) ----------------
      - name: Debug Secrets (HOST & USER)
        run: |
          echo "HOST='${{ secrets.EC2_HOST_STAGING }}'"
          echo "USER='${{ secrets.EC2_USER }}'"

      # ---------------- DEPLOY ----------------
      - name: Deploy to EC2
        run: |
          set -e

          HOST="${{ secrets.EC2_HOST_STAGING }}"
          USER="${{ secrets.EC2_USER }}"

          echo "Connecting to: $USER@$HOST"

          if [ -z "$HOST" ]; then
            echo "❌ ERROR: EC2_HOST_STAGING is EMPTY"
            exit 1
          fi

          if [ -z "$USER" ]; then
            echo "❌ ERROR: EC2_USER is EMPTY"
            exit 1
          fi

          ssh -o StrictHostKeyChecking=no ${USER}@${HOST} << 'EOF'

          set -e

          IMAGE=${{ secrets.DOCKER_USERNAME }}/demo-app:${{ github.sha }}

          echo "Logging into Docker..."
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

          echo "Pulling image..."
          docker pull $IMAGE

          echo "Saving old image for rollback..."
          docker inspect demo-app --format='{{.Config.Image}}' > last_image.txt || true

          echo "Restarting container..."
          docker stop demo-app || true
          docker rm demo-app || true

          docker run -d -p 3001:3000 --name demo-app $IMAGE

          echo "Deployment completed"

          EOF

# ------------------------
# VERIFY + ROLLBACK
# ------------------------
  verify:
    needs: deploy
    runs-on: ubuntu-latest

    steps:

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Health Check + Rollback
        run: |
          HOST="${{ secrets.EC2_HOST_STAGING }}"
          USER="${{ secrets.EC2_USER }}"

          ssh -o StrictHostKeyChecking=no ${USER}@${HOST} << 'EOF'

          set -e

          echo "Checking app health..."
          sleep 10

          if curl -f http://localhost:3001/health > /dev/null 2>&1; then
            echo "✅ App is healthy"
          else
            echo "❌ Health failed → Rolling back"

            LAST_IMAGE=$(cat last_image.txt)

            docker stop demo-app || true
            docker rm demo-app || true

            docker run -d -p 3001:3000 --name demo-app $LAST_IMAGE
          fi

          EOF
