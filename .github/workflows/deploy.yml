name: CI-CD-Staging

on:
  push:
    branches: [staging]

env:
  IMAGE: ${{ secrets.DOCKER_USERNAME }}/demo-app

jobs:

# ------------------------
# BUILD & PUSH
# ------------------------
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t $IMAGE:${{ github.sha }} .

      - name: Push Docker Image
        run: docker push $IMAGE:${{ github.sha }}

# ------------------------
# DEPLOY TO STAGING
# ------------------------
  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Validate Secrets
        run: |
          if [ -z "${{ secrets.EC2_HOST_STAGING }}" ]; then
            echo "❌ EC2_HOST_STAGING is EMPTY"
            exit 1
          fi

          if [ -z "${{ secrets.EC2_USER }}" ]; then
            echo "❌ EC2_USER is EMPTY"
            exit 1
          fi

          echo "✅ Secrets OK"

      - name: Deploy to EC2 (STAGING)
        run: |
          HOST="${{ secrets.EC2_HOST_STAGING }}"
          USER="${{ secrets.EC2_USER }}"

          echo "Connecting to $USER@$HOST"

          ssh -o StrictHostKeyChecking=no ${USER}@${HOST} << 'EOF'

          set -e

          IMAGE=${{ secrets.DOCKER_USERNAME }}/demo-app:${{ github.sha }}

          echo "Logging into Docker..."
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

          echo "Saving previous image for rollback..."
          docker inspect demo-app --format='{{.Config.Image}}' > last_image.txt || true

          echo "Pulling new image..."
          docker pull $IMAGE

          echo "Stopping old container..."
          docker stop demo-app || true
          docker rm demo-app || true

          echo "Starting new container..."
          docker run -d -p 3001:3000 --name demo-app $IMAGE

          echo "Deployment successful"

          EOF

# ------------------------
# HEALTH CHECK + ROLLBACK
# ------------------------
  verify:
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Health Check + Rollback
        run: |
          HOST="${{ secrets.EC2_HOST_STAGING }}"
          USER="${{ secrets.EC2_USER }}"

          ssh -o StrictHostKeyChecking=no ${USER}@${HOST} << 'EOF'

          set -e

          echo "Waiting for app to start..."
          sleep 10

          if curl -f http://localhost:3001/health > /dev/null 2>&1; then
            echo "✅ App is healthy"
          else
            echo "❌ Health check failed → Rolling back"

            LAST_IMAGE=$(cat last_image.txt)

            docker stop demo-app || true
            docker rm demo-app || true

            docker run -d -p 3001:3000 --name demo-app $LAST_IMAGE
          fi

          EOF
