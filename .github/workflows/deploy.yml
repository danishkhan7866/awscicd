name: CI-CD-Staging

on:
  push:
    branches: [staging]

env:
  IMAGE: ${{ secrets.DOCKER_USERNAME }}/demo-app

# ------------------------
# BUILD & PUSH IMAGE
# ------------------------
jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Image
        run: docker build -t $IMAGE:${{ github.sha }} .

      - name: Push Image
        run: docker push $IMAGE:${{ github.sha }}

# ------------------------
# DEPLOY TO STAGING
# ------------------------
  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy to Staging EC2
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST_STAGING }} << EOF

          set -e

          IMAGE=${{ secrets.DOCKER_USERNAME }}/demo-app:${{ github.sha }}

          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

          echo "Saving last image for rollback..."
          docker inspect demo-app --format='{{.Config.Image}}' > last_image.txt || true

          echo "Pulling new image..."
          docker pull $IMAGE

          echo "Stopping old container..."
          docker stop demo-app || true
          docker rm demo-app || true

          echo "Starting new container..."
          docker run -d -p 3001:3000 --name demo-app $IMAGE

          EOF

# ------------------------
# HEALTH CHECK + ROLLBACK
# ------------------------
  verify:
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Health Check + Rollback
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST_STAGING }} << 'EOF'

          set -e

          sleep 10

          if curl -f http://localhost:3001/health > /dev/null 2>&1; then
            echo "✅ Staging app is healthy"
          else
            echo "❌ Health check failed → Rolling back"

            LAST_IMAGE=$(cat last_image.txt)

            docker stop demo-app || true
            docker rm demo-app || true

            docker run -d -p 3001:3000 --name demo-app $LAST_IMAGE
          fi

          EOF
